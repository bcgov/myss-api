openapi: 3.0.3
info:
  title: MySelfServe API
  version: 0.1.0
  description: |
    BC Government Income Assistance Self-Service Portal API.

    MySS 2.0 provides self-service capabilities for BC income assistance clients
    to manage service requests, monthly reports, payments, employment plans,
    messages, and account settings. Ministry workers can access client data
    through an admin support view.

    ## Authentication

    Most endpoints require a JWT Bearer token issued via BCeID/IDIR through
    Keycloak OIDC. The token is signed with HS256 and contains claims for
    `sub` (user_id), `role`, `bceid_guid`, and `idir_username`.

    ## Roles

    - **CLIENT** — BCeID-authenticated income assistance clients
    - **WORKER** — IDIR-authenticated ministry staff (includes ADMIN)
    - **ADMIN** — System administrators (inherits WORKER permissions)

    ## Error Handling

    Errors from the upstream Siebel/ICM system are mapped to standard HTTP
    status codes with structured JSON error bodies. A circuit breaker protects
    the application during ICM outages (5 failures → 30s open window → 503).
  contact:
    name: MySS Development Team
  license:
    name: BC Government
    url: https://www2.gov.bc.ca/

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://myss-api-dev.apps.silver.devops.gov.bc.ca
    description: Development (OpenShift)
  - url: https://myss-api-test.apps.silver.devops.gov.bc.ca
    description: Test (OpenShift)
  - url: https://myss-api.apps.silver.devops.gov.bc.ca
    description: Production (OpenShift)

tags:
  - name: Health
    description: Application health and readiness probes
  - name: Eligibility
    description: Public eligibility estimator (no authentication required)
  - name: Registration
    description: Multi-step client registration flow
  - name: Service Requests
    description: Create, draft, submit, and manage service requests
  - name: Monthly Reports
    description: SD81 monthly income reports
  - name: Notifications
    description: Banner notifications
  - name: Messages
    description: Client inbox, replies, and message signing
  - name: Payment
    description: Payment info, schedules, MIS data, and T5 slips
  - name: Employment Plans
    description: View and sign employment plans
  - name: Account
    description: Profile, contact info, and case members
  - name: PIN
    description: PIN validation, change, and reset
  - name: Attachments
    description: File upload, virus scanning, and download
  - name: "Admin: Support View"
    description: Worker support view for accessing client data
  - name: "Admin: AO Registration"
    description: Administrative override registration flow

security:
  - BearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Application health check
      description: Returns the health status of the API, database, and Redis.
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ──────────────────────────────────────────────
  # Eligibility Estimator
  # ──────────────────────────────────────────────
  /eligibility-estimator/calculate:
    post:
      operationId: calculateEligibility
      tags: [Eligibility]
      summary: Calculate eligibility estimate
      description: |
        Public endpoint. Calculates an estimated monthly benefit amount
        based on household composition, income, and assets. Uses database
        rate tables with a fallback to hardcoded rates if the DB is unavailable.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityRequest"
      responses:
        "200":
          description: Eligibility calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ──────────────────────────────────────────────
  # Registration
  # ──────────────────────────────────────────────
  /registration/start:
    post:
      operationId: startRegistration
      tags: [Registration]
      summary: Start a new registration session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRegistrationRequest"
      responses:
        "201":
          description: Registration session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRegistrationResponse"

  /registration/verify/{invite_token}:
    get:
      operationId: verifyInviteToken
      tags: [Registration]
      summary: Verify an email invitation token
      description: Validates the invite token and redirects to the PIN creation step.
      security: []
      parameters:
        - name: invite_token
          in: path
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to PIN creation step
          headers:
            Location:
              schema:
                type: string
                example: /registration/{session_token}/pin
        "410":
          description: Token expired, used, or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /registration/{token}/step/{step_number}:
    get:
      operationId: getRegistrationStep
      tags: [Registration]
      summary: Get current registration step state
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: step_number
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepStateResponse"

  /registration/{token}/personal-info:
    post:
      operationId: submitPersonalInfo
      tags: [Registration]
      summary: Submit personal information (step 2)
      description: |
        Submits the applicant's personal information including name, SIN, DOB,
        contact details, and optional spouse information. SIN is validated
        via Luhn algorithm; PHN via MOD 11; age must be >= 16.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalInfoRequest"
      responses:
        "201":
          description: Personal info accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalInfoResponse"
        "409":
          description: Previous steps not completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /registration/{token}/pin:
    post:
      operationId: createRegistrationPin
      tags: [Registration]
      summary: Create PIN (step 4)
      description: Sets the client's 4-digit PIN after email verification.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinRequest"
      responses:
        "201":
          description: PIN created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinResponse"
        "409":
          description: Email verification not completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /registration/{token}/link-bceid:
    post:
      operationId: linkBceid
      tags: [Registration]
      summary: Link BCeID account (step 5)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: BCeID link pending
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
                    example: BCeID link not yet implemented
        "409":
          description: Previous steps not completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # Service Requests
  # ──────────────────────────────────────────────
  /service-requests:
    get:
      operationId: listServiceRequests
      tags: [Service Requests]
      summary: List client's service requests
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of service requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createServiceRequest
      tags: [Service Requests]
      summary: Create a new service request draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SRCreateRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Active SR of this type already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /service-requests/eligible-types:
    get:
      operationId: getEligibleSRTypes
      tags: [Service Requests]
      summary: Get SR types the client is eligible to submit
      parameters:
        - name: case_status
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of eligible SR types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SRTypeMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /service-requests/{sr_id}:
    get:
      operationId: getServiceRequest
      tags: [Service Requests]
      summary: Get service request details
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Service request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /service-requests/{sr_id}/draft:
    get:
      operationId: getServiceRequestDraft
      tags: [Service Requests]
      summary: Get the draft state of a service request
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Draft data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Draft not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /service-requests/{sr_id}/form:
    get:
      operationId: getServiceRequestForm
      tags: [Service Requests]
      summary: Get the dynamic form schema for a service request
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
        - name: sr_type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SRType"
      responses:
        "200":
          description: Dynamic form schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DynamicFormSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Form schema not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateServiceRequestForm
      tags: [Service Requests]
      summary: Save form answers for a service request draft
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SRFormUpdateRequest"
      responses:
        "200":
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Draft not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /service-requests/{sr_id}/submit:
    post:
      operationId: submitServiceRequest
      tags: [Service Requests]
      summary: Submit a service request
      description: |
        Submits the service request to ICM. Requires a valid PIN and
        declaration acceptance. Some SR types also require a spouse PIN.
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SRSubmitRequest"
      responses:
        "200":
          description: Service request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SRSubmitResponse"
        "400":
          description: Invalid request (e.g. missing required fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /service-requests/{sr_id}/withdraw:
    post:
      operationId: withdrawServiceRequest
      tags: [Service Requests]
      summary: Withdraw a service request
      parameters:
        - name: sr_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SRWithdrawRequest"
      responses:
        "204":
          description: Service request withdrawn
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: ICM error during withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Service request already withdrawn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # Monthly Reports
  # ──────────────────────────────────────────────
  /monthly-reports:
    get:
      operationId: listMonthlyReports
      tags: [Monthly Reports]
      summary: List monthly reports
      parameters:
        - name: days_ago
          in: query
          description: Number of days of history to retrieve
          schema:
            type: integer
            minimum: 1
            default: 365
      responses:
        "200":
          description: List of monthly reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SD81ListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createMonthlyReport
      tags: [Monthly Reports]
      summary: Create a new monthly report draft
      responses:
        "201":
          description: Monthly report draft created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sd81_id:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /monthly-reports/current-period:
    get:
      operationId: getCurrentReportPeriod
      tags: [Monthly Reports]
      summary: Get the current reporting period schedule
      parameters:
        - name: case_number
          in: query
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Current reporting period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChequeScheduleWindow"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monthly-reports/{sd81_id}/answers:
    get:
      operationId: getMonthlyReportAnswers
      tags: [Monthly Reports]
      summary: Get saved answers for a monthly report
      parameters:
        - name: sd81_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report answers
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      operationId: saveMonthlyReportAnswers
      tags: [Monthly Reports]
      summary: Save answers for a monthly report
      parameters:
        - name: sd81_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Answers saved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monthly-reports/{sd81_id}/submit:
    post:
      operationId: submitMonthlyReport
      tags: [Monthly Reports]
      summary: Submit a monthly report
      parameters:
        - name: sd81_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SD81SubmitRequest"
      responses:
        "200":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SD81SubmitResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Submission period closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /monthly-reports/{sd81_id}/restart:
    post:
      operationId: restartMonthlyReport
      tags: [Monthly Reports]
      summary: Restart a monthly report
      parameters:
        - name: sd81_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report restarted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /monthly-reports/{sd81_id}/pdf:
    get:
      operationId: downloadMonthlyReportPdf
      tags: [Monthly Reports]
      summary: Download a monthly report as PDF
      parameters:
        - name: sd81_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF document
          headers:
            Content-Disposition:
              schema:
                type: string
                example: "inline; filename=SD81_12345.pdf"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Notifications & Messages
  # ──────────────────────────────────────────────
  /notifications/banners:
    get:
      operationId: getBanners
      tags: [Notifications]
      summary: Get active banner notifications
      responses:
        "200":
          description: Active banners
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /messages:
    get:
      operationId: listMessages
      tags: [Messages]
      summary: List inbox messages
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated inbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /messages/{msg_id}:
    get:
      operationId: getMessage
      tags: [Messages]
      summary: Get message details
      description: Returns the full message body and attachments. Marks the message as read in the background.
      parameters:
        - name: msg_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      operationId: deleteMessage
      tags: [Messages]
      summary: Delete a message
      parameters:
        - name: msg_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Message deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /messages/{msg_id}/reply:
    post:
      operationId: replyToMessage
      tags: [Messages]
      summary: Reply to a message
      parameters:
        - name: msg_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyRequest"
      responses:
        "200":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Reply not allowed for this message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /messages/{msg_id}/sign:
    post:
      operationId: signMessage
      tags: [Messages]
      summary: Sign a message with PIN
      parameters:
        - name: msg_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
      responses:
        "200":
          description: Message signed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: signed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ──────────────────────────────────────────────
  # Payment
  # ──────────────────────────────────────────────
  /payment/info:
    get:
      operationId: getPaymentInfo
      tags: [Payment]
      summary: Get payment information
      description: Returns upcoming benefit date, supplements, service provider payments, and MIS data.
      responses:
        "200":
          description: Payment information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /payment/schedule:
    get:
      operationId: getPaymentSchedule
      tags: [Payment]
      summary: Get cheque schedule
      responses:
        "200":
          description: Cheque schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChequeScheduleWindow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /payment/mis-data:
    get:
      operationId: getMISData
      tags: [Payment]
      summary: Get MIS payment breakdown
      responses:
        "200":
          description: MIS payment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MISPaymentData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /payment/t5-slips:
    get:
      operationId: listT5Slips
      tags: [Payment]
      summary: List available T5007 tax slips
      responses:
        "200":
          description: T5 slip list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/T5SlipList"
        "401":
