# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token signed with HS256. Claims: `sub` (user_id), `role` (CLIENT/WORKER/ADMIN),
        `bceid_guid` (clients), `idir_username` (workers/admins), `exp` (expiry).
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: HMAC secret for internal AV scanner webhook

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Upstream service (ICM/Siebel) unavailable — circuit breaker open
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Common ──────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message
      required:
        - detail

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
                description: Field location path
              msg:
                type: string
                description: Error message
              type:
                type: string
                description: Error type
            required:
              - loc
              - msg
              - type

    # ── Health ──────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: string
          enum: [ok, error]
        redis:
          type: string
          enum: [ok, error]
      required:
        - status
        - db
        - redis

    # ── Enums ───────────────────────────────────
    RelationshipStatus:
      type: string
      enum: [SINGLE, COUPLE]

    SRType:
      type: string
      enum:
        - ASSIST
        - RREINSTATE
        - CRISIS_FOOD
        - CRISIS_SHELTER
        - CRISIS_CLOTHING
        - CRISIS_UTILITIES
        - CRISIS_MED_TRANSPORT
        - DIRECT_DEPOSIT
        - DIET
        - NATAL
        - MED_TRANSPORT_LOCAL
        - MED_TRANSPORT_NON_LOCAL
        - RECONSIDERATION
        - RECON_SUPPLEMENT
        - RECON_EXTENSION
        - STREAMLINED
        - BUS_PASS
        - PWD_DESIGNATION
        - PPMB

    SD81Status:
      type: string
      enum: [PRT, SUB, RST, RES, PND]
      description: |
        Monthly report status codes:
        - PRT: Partial (in progress)
        - SUB: Submitted
        - RST: Restarted
        - RES: Resubmitted
        - PND: Pending Documents

    ICMMessageType:
      type: string
      enum:
        - HR0081
        - HR0081Restart
        - HR0081StreamlinedRestart
        - "HR0081 Pending Documents"
        - FormSubmission
        - General

    EPStatus:
      type: string
      enum: [Received, Submitted, PendingSignature]

    ScanStatus:
      type: string
      enum: [PENDING, SCANNING, CLEAN, INFECTED]

    DynamicFormType:
      type: string
      enum: [SR, MONTHLY_REPORT, APPLICATION]

    AccountCreationType:
      type: string
      enum: [SELF, WITH_HELPER, POA, PARENT]

    Gender:
      type: string
      enum: [M, F, U]

    PhoneType:
      type: string
      enum: [HOME, CELL, WORK, MESSAGE]

    BenefitCode:
      type: integer
      enum: [32, 41, 42, 73]
      description: |
        Benefit codes:
        - 32: Housing Stability Supplement
        - 41: Support
        - 42: Shelter
        - 73: Hardship/Comforts

    PhoneNumberOperation:
      type: string
      enum: [ADD, UPDATE, DELETE]

    # ── Eligibility ─────────────────────────────
    EligibilityRequest:
      type: object
      required:
        - relationship_status
        - num_dependants
        - applicant_pwd
        - monthly_income
      properties:
        relationship_status:
          $ref: "#/components/schemas/RelationshipStatus"
        num_dependants:
          type: integer
          minimum: 0
          maximum: 20
        applicant_pwd:
          type: boolean
          description: Applicant has Person with Disabilities designation
        spouse_pwd:
          type: boolean
          default: false
        monthly_income:
          type: number
          format: decimal
          minimum: 0
        spouse_monthly_income:
          type: number
          format: decimal
          minimum: 0
          default: 0
        primary_vehicle_value:
          type: number
          format: decimal
          minimum: 0
          default: 0
        other_vehicle_value:
          type: number
          format: decimal
          minimum: 0
          default: 0
        other_asset_value:
          type: number
          format: decimal
          minimum: 0
          default: 0

    EligibilityResponse:
      type: object
      required:
        - eligible
        - estimated_amount
        - client_type
      properties:
        eligible:
          type: boolean
        estimated_amount:
          type: number
          format: decimal
        ineligibility_reason:
          type: string
          nullable: true
        client_type:
          type: string
