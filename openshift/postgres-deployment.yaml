apiVersion: apps/v1
kind: Deployment
metadata:
  name: myss-postgres
  labels:
    app: myss
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myss
      component: postgres
  template:
    metadata:
      labels:
        app: myss
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: myss-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: myss-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myss-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: myss-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myss-postgres-pvc
  labels:
    app: myss
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: myss-postgres
  labels:
    app: myss
    component: postgres
spec:
  selector:
    app: myss
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
