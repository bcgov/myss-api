apiVersion: apps/v1
kind: Deployment
metadata:
  name: myss-redis
  labels:
    app: myss
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myss
      component: redis
  template:
    metadata:
      labels:
        app: myss
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          args:
            - "--appendonly"
            - "yes"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myss-redis-secret
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: myss-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myss-redis-pvc
  labels:
    app: myss
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: myss-redis
  labels:
    app: myss
    component: redis
spec:
  selector:
    app: myss
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
