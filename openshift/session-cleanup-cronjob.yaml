apiVersion: batch/v1
kind: CronJob
metadata:
  name: myss-session-cleanup
  labels:
    app: myss
    component: cleanup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: myss-api:latest
              command:
                - python
                - -c
                - "from app.tasks.cleanup import run_cleanup; run_cleanup()"
              envFrom:
                - secretRef:
                    name: myss-db-secret
                - configMapRef:
                    name: myss-api-config
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "100m"
