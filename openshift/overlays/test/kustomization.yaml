apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: Can't reference `../../` directly because the overlay lives inside
# the base directory (openshift/overlays/test/ is under openshift/), which
# trips Kustomize v5's cycle detection. List base files explicitly instead.
# When rendering locally, use:
#   oc kustomize --load-restrictor LoadRestrictionsNone openshift/overlays/test/
# `oc apply -k` in recent client versions handles the restrictor automatically.
resources:
  - ../../configmap.yaml
  - ../../secrets-template.yaml
  - ../../postgres-deployment.yaml
  - ../../redis-deployment.yaml
  - ../../api-deployment.yaml
  - ../../celery-deployment.yaml
  - ../../alembic-job.yaml
  - ../../session-cleanup-cronjob.yaml
  - seed-job.yaml

patches:
  - path: patch-api-configmap.yaml
    target:
      kind: ConfigMap
      name: myss-api-config

namespace: myss-test
