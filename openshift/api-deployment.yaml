apiVersion: apps/v1
kind: Deployment
metadata:
  name: myss-api
  labels:
    app: myss
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: myss
      component: api
  template:
    metadata:
      labels:
        app: myss
        component: api
    spec:
      initContainers:
        - name: alembic-migrate
          image: myss-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: myss-db-secret
            - configMapRef:
                name: myss-api-config
      containers:
        - name: myss-api
          image: myss-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: myss-db-secret
            - secretRef:
                name: myss-redis-secret
            - secretRef:
                name: myss-icm-secret
            - secretRef:
                name: myss-mail-secret
            - configMapRef:
                name: myss-api-config
            - configMapRef:
                name: myss-upload-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: myss-api
  labels:
    app: myss
    component: api
spec:
  selector:
    app: myss
    component: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
